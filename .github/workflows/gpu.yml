name: GPU Benchmark

on:
  push:
    branches: [ master, gouda, mcgouda ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  gpu-benchmark:
    runs-on: [ self-hosted, linux, x64, gpu ]
    env:
      DEBIAN_FRONTEND: noninteractive
      CUDACXX: /usr/local/cuda/bin/nvcc
      CLICOLOR_FORCE: 1
      LD_LIBRARY_PATH: /usr/local/cuda/lib64
    steps:
      - uses: actions/checkout@v4

      - name: Get deps
        run: mkdir -p ~/deps && mv ~/deps .

      - name: Get build
        run: mkdir -p ~/nigiri-build && mv ~/nigiri-build build

      - name: Configure
        run: cmake --preset cuda

      - name: Build
        run: cmake --build --preset cuda --target nigiri-test nigiri-benchmark

      - name: nigiri-test
        run: ./build/cuda/nigiri-test

      - name: Save deps
        if: always()
        run: mv deps ~

      - name: Validate Germany
        run: |
          ./build/cuda/nigiri-benchmark -p "$HOME/ci-data/ger/data/tt.bin" \
            --engines cpu gpu \
            --algo raptor pong \
            --modes station-station coordinate-coordinate \
            -n 50

      # strategy cross-validation: pong vs range search (search.h), one
      # invocation per algorithm pair = CPU pong vs CPU range mutually
      # gap-free on the common min(N, M) prefix within the common searched
      # window (relaxed rule - the stopping rules legitimately differ)
      # PLUS the usual cpu/gpu exactness for each of the two cells.
      # --extend_interval_earlier false: pong only extends its window
      # forward; the range search must do the same for window symmetry.
      - name: Cross-validate Germany (pong vs range search x cpu/gpu)
        run: |
          for pair in "pong raptor" \
                      "pong-mcraptor mcraptor" \
                      "pong-mcraptor-cost mcraptor-cost"; do
            ./build/cuda/nigiri-benchmark -p "$HOME/ci-data/ger/data/tt.bin" \
              --engines cpu gpu --cross \
              --algo $pair \
              --modes coordinate-coordinate \
              --extend_interval_earlier false \
              -n 50
          done

      - name: Validate Europe
        run: |
          ./build/cuda/nigiri-benchmark -p "$HOME/ci-data/eu/data/tt.bin" \
            --engines cpu gpu \
            --algo pong \
            --modes coordinate-coordinate \
            --gpu_states 2 \
            -n 20

      - name: Save build
        if: always()
        run: mv build ~/nigiri-build
