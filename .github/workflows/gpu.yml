name: GPU Benchmark

on:
  push:
    branches: [ master, gouda ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gpu-benchmark:
    runs-on: [ self-hosted, linux, x64, gpu ]
    env:
      DEBIAN_FRONTEND: noninteractive
      CUDACXX: /usr/local/cuda/bin/nvcc
      CLICOLOR_FORCE: 1
      LD_LIBRARY_PATH: /usr/local/cuda/lib64
    steps:
      - uses: actions/checkout@v4

      - name: Get deps
        run: mkdir -p ~/deps && mv ~/deps .

      - name: Get build
        run: mkdir -p ~/nigiri-build && mv ~/nigiri-build build

      - name: Configure
        run: cmake --preset cuda

      - name: Build
        run: cmake --build --preset cuda --target nigiri-test nigiri-benchmark

      - name: nigiri-test
        run: ./build/cuda/nigiri-test

      - name: Save deps
        if: always()
        run: mv deps ~

      - name: Benchmark Germany (full matrix)
        run: |
          ./build/cuda/nigiri-benchmark -p "$HOME/ci-data/ger/data/tt.bin" \
            --engines cpu gpu \
            --algo raptor pong \
            --modes station-station coordinate-coordinate \
            -n 100

      - name: Benchmark Europe (full matrix)
        run: |
          ./build/cuda/nigiri-benchmark -p "$HOME/ci-data/eu/data/tt.bin" \
            --engines cpu gpu \
            --algo raptor pong \
            --modes station-station coordinate-coordinate \
            -n 100 --gpu_states 2

      - name: Save build
        if: always()
        run: mv build ~/nigiri-build
