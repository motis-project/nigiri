type MapData {
	"""
	Stops in the specified area
	"""
	stops(
		"""
		Filter by pickup/dropoff availability
		"""
		pickupDropoffFilter: PickupDropoffFilter
	): [Stop!]!
	"""
	Routes in the specified area
	"""
	routes(
		"""
		Filter by start time (only routes active after this time)
		"""
		startTime: DateTime,
		"""
		Filter by end time (only routes active before this time)
		"""
		endTime: DateTime,
		"""
		Include real-time service status
		"""
		includeRealtime: Boolean! = true
	): [Route!]!
	"""
	Active trips in the specified area
	
	Returns trips whose routes serve the queried stops and that are active
	within the given time window. Without time filters, returns trips active
	on the current local date.
	"""
	trips(
		"""
		Filter by start time
		"""
		startTime: DateTime,
		"""
		Filter by end time
		"""
		endTime: DateTime,
		"""
		Maximum number of trips to return (default 100)
		"""
		limit: Int
	): [Trip!]!
	"""
	Vehicles currently in the specified area
	
	Iterates all RT transports that have a vehicle attached and returns
	those whose GPS position falls within the queried bounding box/radius.
	"""
	vehicles: [Vehicle!]!
	"""
	Shared mobility options (bikes, scooters) in the area
	"""
	placemarks: [String!]!
}

