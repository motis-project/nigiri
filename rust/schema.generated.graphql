		limit: Int
	): [Trip!]!
	"""
	Globally unique ID — tag-prefixed group slug, e.g. `"SEQ:60"` or `"SEQ:gold_coast"`.
	
	Constructed via [`RouteIdentifier`] to ensure the canonical format is always used.
	
	[`RouteIdentifier`]: crate::identifiers::RouteIdentifier
	"""
	id: ID!
	"""
	Data source tag for this route (e.g. `"SEQ"`, `"CNS"`)
	"""
	source: String!
	"""
	All GTFS `route_id` strings that belong to this route group.
	
	Most routes have one entry.  Where the same human-visible route has
	multiple GTFS `route_id` values (e.g. different service periods or
	directions encoded as separate entries) they all appear here.
	"""
	gtfsRouteIds: [String!]!
	"""
	Short name or number of the route (e.g., '101', 'A').
	Resolved from the first route_id in the group.
