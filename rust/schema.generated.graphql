type Query {
	"""
	Plan a journey between two locations
	"""
	planJourney(input: JourneyPlanInput!): [Journey!]!
	"""
	Refresh a previously planned journey with real-time updates.
	
	Pass the `journeyToken` returned from `planJourney` to get updated
	departure/arrival times, cancellation status, and transfer feasibility.
	If `requiresReplan` is true, the journey should be re-planned.
	"""
	refreshJourney(
		"""
		Journey token from a previous planJourney result
		"""
		journeyToken: String!
	): JourneyRefreshResult!
	"""
	Unified map query - get transit data for a geographic area
	The location input uses @oneOf to ensure exactly one of boundingBox or radius is provided
	"""
	map(
		"""
		Geographic area to query (exactly one of boundingBox or radius required)
		"""
		location: MapLocationInput!
	): MapData!
	"""
	Search for locations by name
	"""
	searchLocations(		query: String!,		lat: Latitude,		lon: Longitude,		types: [LocationType!],		maxResults: Int! = 10,
		"""
		Preferred languages in priority order, e.g. ["en", "de"]
		"""
		language: [String!]
	): [SearchResult!]!
	"""
	Reverse geocode - find location by coordinates
	"""
	reverseGeocode(lat: Latitude!, lon: Longitude!, radius: Float! = 100.0, types: [LocationType!]): [SearchResult!]!
	"""
	Find stops near a location
	"""
	nearbyStops(		lat: Latitude!,		lon: Longitude!,
		"""
		Search radius in meters
		"""
		radius: Float! = 500.0
	): [Stop!]!
	"""
	Find routes near a location
	"""
	nearbyRoutes(		lat: Latitude!,		lon: Longitude!,
		"""
		Search radius in meters
		"""
		radius: Float! = 500.0
	): [RouteReference!]!
	"""
	Get route by ID
	"""
	route(id: ID!): Route
	"""
	Search routes with flexible filtering and pagination
	"""
	routes(
		"""
		Data source identifier to filter by
		"""
		source: String,
		"""
		Search phrase to match against route names (short name or long name)
		"""
		phrase: String,
		"""
		Filter by route type (bus, train, etc.)
		"""
		routeType: RouteType,
		"""
		Filter by agency/operator name
		"""
		agency: String,
		"""
		Pagination parameters (default: page=1, pageSize=50, max pageSize=1000)
		"""
		pagination: PaginationInput
	): RoutesConnection!
	"""
	Get trip by ID
	"""
	trip(id: ID!): Trip
	"""
	Get stop by ID
	"""
	stop(id: ID!): Stop
	"""
	Get station by ID (resolves to Station if this ID is a station,
	or to the parent station of a stop/platform)
	"""
	station(
		"""
		Stop or station ID
		"""
		id: ID!
	): Station
	"""
	Search stops with flexible filtering and pagination
	"""
	stops(
		"""
		Data source identifier to filter by
		"""
		source: String,
		"""
		Search phrase to match against stop names or codes
		"""
		phrase: String,
		"""
		Filter by location type (stop, station, entrance, etc.)
		"""
		locationType: LocationType,
		"""
		Pagination parameters (default: page=1, pageSize=50, max pageSize=1000)
		"""
		pagination: PaginationInput
	): StopsConnection!
	"""
	Get agency by ID
	"""
	agency(id: ID!): Agency
	"""
	Search agencies with flexible filtering and pagination
	"""
	agencies(
		"""
		Data source identifier to filter by
		"""
		source: String,
		"""
		Search phrase to match against agency names
		"""
		phrase: String,
		"""
		Pagination parameters (default: page=1, pageSize=50, max pageSize=1000)
		"""
		pagination: PaginationInput
	): AgenciesConnection!
	"""
	Get service alerts, filtered by a specific transit entity (stop, route, trip, or operator)
	"""
	alerts(
		"""
		Filter alerts by entity — exactly one of stop, route, trip, or operator
		"""
		filter: AlertFilterInput!,
		"""
		Filter alerts active after this time
		"""
		startTime: DateTime,
		"""
		Filter alerts active before this time
		"""
		endTime: DateTime
	): [ServiceAlert!]!
	"""
	Get upcoming departures from a specific stop
	"""
	stopDepartures(
		"""
		Stop ID to get departures for
		"""
		stopId: ID!,
		"""
		Maximum number of departures to return
		"""
		limit: Int! = 10,
		"""
		Filter by specific transport modes
		"""
		modes: [RouteType!],
		"""
		Filter by specific route IDs
		"""
		routes: [ID!],
		"""
		Include real-time updates
		"""
		includeRealtime: Boolean! = true,
		"""
		Only return departures after this time
		"""
		startTime: DateTime,
		"""
		Include departures from parent/child/equivalent stops
		"""
		expandStops: Boolean! = false
	): [Departure!]!
	"""
	Compute all transit stops reachable from an origin within a travel-time budget.
	
	Returns per-stop arrival times that can be used to render an isochrone map overlay.
	"""
	isochrone(input: IsochroneInput!): IsochroneResult! @deprecated(reason: "Use `reachable` instead, which supports both one-to-many and many-to-one.")
	"""
	Compute all transit stops reachable from (or to) a given location within a travel-time budget.
	
	When `arriveBy` is false (default): **one-to-many** — finds everywhere reachable from the origin.
	When `arriveBy` is true: **many-to-one** — finds everywhere from which the destination is reachable.
	"""
	reachable(input: ReachableInput!): ReachableResult!
}

"""
Input for radius-based location search
"""
input RadiusLocationInput {
	"""
	Center latitude
	"""
	lat: Latitude!
	"""
	Center longitude
	"""
	lon: Longitude!
	"""
	Radius in meters from center point (default: 500m)
	"""
	radius: Float! = 500.0
}

"""
Input for a reachable (one-to-many / many-to-one) query.
"""
input ReachableInput {
	"""
	The 'one' location — origin (arriveBy=false) or destination (arriveBy=true).
	"""
	place: LocationInput!
	"""
	Reference time — departure (arriveBy=false) or arrival (arriveBy=true). Defaults to now.
	"""
	time: DateTime
	"""
