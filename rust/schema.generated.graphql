	shortName: String
	"""
	Full descriptive name of the route.
	Resolved from the first route_id in the group.
	"""
	longName: String!
	"""
	Type of transportation used on this route (bus, train, etc.).
	Resolved from the first route_id in the group.
	"""
	type: RouteType!
	"""
	Branding colors for this route.
	Resolved from the first route_id in the group.
	"""
	color: Color
	"""
	IANA timezone identifier for this route's schedule
	"""
	timezone: String!
	"""
	Agency operating this route
	"""
	agency: AgencyReference
	"""
	Service alerts currently affecting this route
	"""
	alerts(
		"""
		Only return currently active alerts
		"""
		activeOnly: Boolean! = true
	): [ServiceAlert!]!
	"""
	Identifier for the transit network this route belongs to
	"""
	network: String
}

